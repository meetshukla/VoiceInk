name: Sync Upstream VoiceInk

on:
  schedule:
    - cron: "17 9 */2 * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: write

concurrency:
  group: voiceink-upstream-sync
  cancel-in-progress: false

jobs:
  sync-and-rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out fork main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Merge new upstream commits
        id: sync
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/Beingpax/VoiceInk.git
          git fetch --no-tags upstream main

          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Fork main already contains the latest upstream commit."
            exit 0
          fi

          git merge --no-edit upstream/main
          git push origin HEAD:main
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Build updated local release
        if: steps.sync.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run build-local-release.yml --ref main
